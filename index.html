<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narzędzia VPN — Generator haseł i TOTP</title>
  <script src="qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e8eaf6;
      --muted: #8b8fa8;
      --danger: #ff6b6b;
      --success: #00d4aa;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
    }
    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .5rem;
    }
    header p { color: var(--muted); font-size: .95rem; }

    .lang-toggle {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      padding: .25rem .55rem;
      border-radius: 5px;
      transition: background .15s, color .15s;
    }
    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .card-title .icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .icon-pw   { background: linear-gradient(135deg,#6c63ff,#a78bfa); }
    .icon-totp { background: linear-gradient(135deg,#00d4aa,#0ea5e9); }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .6rem .85rem;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1rem;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .options-row { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
    .opt-group { flex: 1; min-width: 130px; }

    .checkrow {
      display: flex; flex-wrap: wrap;
      gap: .5rem 1rem; margin-bottom: 1rem;
    }
    .checkrow label {
      display: flex; align-items: center; gap: .4rem;
      font-size: .85rem; text-transform: none; letter-spacing: 0;
      color: var(--text); cursor: pointer;
    }
    input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }

    .btn {
      width: 100%; padding: .75rem 1rem;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: linear-gradient(135deg,#6c63ff,#a78bfa); color: #fff; }
    .btn-teal    { background: linear-gradient(135deg,#00d4aa,#0ea5e9); color: #fff; }
    .btn:hover { opacity: .9; }

    .result-box {
      margin-top: 1.25rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      display: none;
    }
    .result-box.show { display: block; }

    .result-row {
      display: flex; align-items: center;
      gap: .5rem; margin-bottom: .75rem;
    }
    .result-value {
      flex: 1;
      font-family: 'Cascadia Code','Consolas',monospace;
      font-size: 1rem;
      word-break: break-all;
      color: var(--accent2);
      line-height: 1.4;
    }
    .copy-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: .3rem .6rem;
      font-size: .75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    .result-label {
      font-size: .75rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem;
    }
    .result-block { margin-bottom: 1rem; }
    .result-block:last-child { margin-bottom: 0; }

    .badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .2rem .55rem; border-radius: 20px;
      font-size: .72rem; font-weight: 600; margin-top: .35rem;
    }
    .badge-strong { background: rgba(0,212,170,.15); color: var(--success); }
    .badge-ok     { background: rgba(163,230,53,.12); color: #a3e635; }
    .badge-medium { background: rgba(255,193,7,.15);  color: #ffc107; }
    .badge-weak   { background: rgba(255,107,107,.15);color: var(--danger); }

    .pw-editable {
      flex: 1;
      font-family: 'Cascadia Code','Consolas',monospace;
      font-size: 1rem;
      word-break: break-all;
      color: var(--accent2);
      line-height: 1.4;
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--border);
      outline: none;
      padding: .1rem .2rem;
      cursor: text;
      min-width: 0;
    }
    .pw-editable:focus { border-bottom-color: var(--accent); }

    #qr-container { display: flex; justify-content: center; margin-top: .75rem; }
    #qr-container canvas, #qr-container img {
      border-radius: 8px; border: 6px solid #fff;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

    .totp-live { text-align: center; padding: .5rem 0 .25rem; }
    .totp-code {
      font-family: 'Cascadia Code','Consolas',monospace;
      font-size: 2.4rem; font-weight: 700;
      letter-spacing: .0em; color: var(--accent2);
      cursor: pointer; user-select: none;
      transition: opacity .15s;
    }
    .totp-code:hover { opacity: .75; }
    .totp-code.flash { color: #fff; }
    .totp-bar-wrap {
      height: 5px; background: var(--border);
      border-radius: 3px; margin: .65rem 0 .35rem; overflow: hidden;
    }
    .totp-bar { height: 100%; border-radius: 3px; transition: width 1s linear, background .4s; }
    .totp-countdown { font-size: .8rem; color: var(--muted); }

    footer {
      text-align: center; margin-top: 3rem;
      color: var(--muted); font-size: .8rem;
    }
  </style>
</head>
<body>

<header>
  <h1 data-i18n="title">Narzędzia VPN</h1>
  <p data-i18n="subtitle">Generator łatwych do zapamiętania haseł i konfiguracja TOTP / Google Authenticator</p>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('pl')">PL</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="grid">

  <!-- ── PASSWORD GENERATOR ── -->
  <div class="card">
    <div class="card-title">
      <span class="icon icon-pw">🔑</span>
      <span data-i18n="pwCardTitle">Generator haseł VPN</span>
    </div>

    <div class="options-row">
      <div class="opt-group">
        <label data-i18n="styleLabel">Styl</label>
        <select id="pw-style">
          <option value="words"  data-i18n="styleWords">Łatwe do zapamiętania</option>
          <option value="random" data-i18n="styleRandom">Losowe znaki</option>
        </select>
      </div>
      <div class="opt-group" id="words-count-wrap">
        <label data-i18n="wordCountLabel">Liczba słów</label>
        <select id="pw-words">
          <option value="3" data-i18n="words3">3 słowa</option>
          <option value="4" selected data-i18n="words4">4 słowa</option>
          <option value="5" data-i18n="words5">5 słów</option>
        </select>
      </div>
      <div class="opt-group" id="random-len-wrap" style="display:none">
        <label data-i18n="lengthLabel">Długość</label>
        <input type="number" id="pw-len" value="16" min="8" max="64" />
      </div>
    </div>

    <div id="word-options">
      <div class="options-row">
        <div class="opt-group">
          <label data-i18n="sepLabel">Separator</label>
          <select id="pw-sep">
            <option value="-"  data-i18n="sepDash">-</option>
            <option value="."  data-i18n="sepDot">.</option>
            <option value="_"  data-i18n="sepUnder">_</option>
            <option value=""   data-i18n="sepNone" selected>Brak</option>
          </select>
        </div>
        <div class="opt-group">
          <label data-i18n="capLabel">Wielkie litery</label>
          <select id="pw-cap">
            <option value="first" data-i18n="capFirst">Pierwsza litera</option>
            <option value="all" selected data-i18n="capAll">Wszystkie słowa</option>
            <option value="none"  data-i18n="capNone">Brak</option>
          </select>
        </div>
      </div>
    </div>

    <div class="checkrow">
      <label><input type="checkbox" id="pw-digits" checked /> <span data-i18n="addDigits">Dodaj cyfry</span></label>
      <label><input type="checkbox" id="pw-symbol" checked /> <span data-i18n="addSymbol">Dodaj symbol</span></label>
    </div>

    <div>
      <label data-i18n="countLabel">Ile haseł</label>
      <input type="number" id="pw-count" value="3" min="1" max="10" style="max-width:100px; margin-bottom:.75rem;" />
    </div>

    <button class="btn btn-primary" onclick="generatePasswords()" data-i18n="generatePw">Generuj hasła</button>
    <div class="result-box" id="pw-results"></div>
  </div>

  <!-- ── TOTP GENERATOR ── -->
  <div class="card">
    <div class="card-title">
      <span class="icon icon-totp">🛡️</span>
      <span data-i18n="totpCardTitle">TOTP / Google Authenticator</span>
    </div>

    <label data-i18n="totpLabelLabel">Nazwa konta</label>
    <input type="text" id="totp-label" data-i18n-placeholder="totpLabelPlaceholder" placeholder="np. JanNowak" />

    <label data-i18n="totpIssuerLabel">Wydawca</label>
    <input type="text" id="totp-issuer" value="Cyfrowe VPN" />

    <button class="btn btn-teal" onclick="generateTOTP()" data-i18n="generateTotp">Generuj klucz TOTP</button>
    <div class="result-box" id="totp-results"></div>
  </div>

</div>

<footer>
  <span data-i18n-html="footer">Wszystkie operacje wykonywane są w przeglądarce — żadne dane nie są wysyłane na serwer.</span>
</footer>

let currentLang = 'pl';
let _lastPasswords = null, _lastBits = 0;
let _lastTotpSecret = null;
document.addEventListener('DOMContentLoaded', () => setLang('pl'));

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  // toggle active button
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === lang);
  });

  const t = T[lang];

  // text content
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.textContent = t[key];
  });

  // html content
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.dataset.i18nHtml;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  // document title
  document.title = lang === 'pl'
    ? 'Narzędzia VPN — Generator haseł i TOTP'
    : 'VPN Tools — Password & TOTP Generator';

  // re-render with same data (do not regenerate)
  const pwBox = document.getElementById('pw-results');
  if (pwBox.classList.contains('show') && _lastPasswords) renderPasswordResults(_lastPasswords, _lastBits);
  const totpBox = document.getElementById('totp-results');
  if (totpBox.classList.contains('show') && _lastTotpSecret) renderTOTP(_lastTotpSecret);
}

const SYMBOLS = '!@#$%&*-+=?';
const DIGITS  = '0123456789';

function rand(n) {
  if (n <= 0 || !Number.isInteger(n)) throw new RangeError('rand: n must be a positive integer');
  if (n === 1) return 0;
  const limit = Math.floor(0x100000000 / n) * n;
  const a = new Uint32Array(1);
  do { crypto.getRandomValues(a); } while (a[0] >= limit);
  return a[0] % n;
}
function pick(arr) { return arr[rand(arr.length)]; }
function randChar(set) { return set[rand(set.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeWordPassword(wordCount, sep, capMode, addDigits, addSymbol) {
  const pool = currentLang === 'pl' ? WORDS_PL : WORDS_EN;
  const words = Array.from({length: wordCount}, (_, i) => {
    const w = pick(pool);
    if (capMode === 'none')  return w;
    if (capMode === 'first') return i === 0 ? w.charAt(0).toUpperCase() + w.slice(1) : w;
    return w.charAt(0).toUpperCase() + w.slice(1); // capAll
  });

  let base = words.join(sep);
  let extras = [];
  if (addDigits) extras.push(String(rand(900) + 100));
  if (addSymbol) extras.push(randChar(SYMBOLS));
  extras = shuffle(extras);

  if (extras.length === 0) return base;
  return rand(2) === 0 ? base + sep + extras.join('') : extras.join('') + sep + base;
}

function makeRandomPassword(length, addDigits, addSymbol) {
  const lower = 'abcdefghijklmnopqrstuvwxyz';
  const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let pool = lower + upper;
  if (addDigits) pool += DIGITS;
  if (addSymbol) pool += SYMBOLS;

  const required = [pick([...lower]), pick([...upper])];
  if (addDigits)  required.push(randChar(DIGITS));
  if (addSymbol)  required.push(randChar(SYMBOLS));
  for (let i = required.length; i < length; i++) required.push(randChar(pool));
  return shuffle(required).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function calcEntropy(style, wordCount, poolSize, addDigits, addSymbol, pwLength) {
  if (style === 'words') {
    let bits = wordCount * Math.log2(poolSize);
    if (addDigits) bits += Math.log2(900);
    if (addSymbol) bits += Math.log2(SYMBOLS.length);
    return Math.round(bits);
  }
  let sz = 52; // a-z + A-Z
  if (addDigits) sz += 10;
  if (addSymbol) sz += SYMBOLS.length;
  return Math.round(pwLength * Math.log2(sz));
}

function strengthBadge(bits) {
  const t = T[currentLang];
  const label = `~${bits} bit`;
  if (bits >= 80) return `<span class="badge badge-strong">${t.strengthStrong} (${label})</span>`;
  if (bits >= 60) return `<span class="badge badge-ok">${t.strengthOk} (${label})</span>`;
  if (bits >= 35) return `<span class="badge badge-medium">${t.strengthMedium} (${label})</span>`;
  return `<span class="badge badge-weak">${t.strengthWeak} (${label})</span>`;
}

document.getElementById('pw-style').addEventListener('change', function() {
  const isWords = this.value === 'words';
  document.getElementById('words-count-wrap').style.display = isWords ? '' : 'none';
  document.getElementById('random-len-wrap').style.display  = isWords ? 'none' : '';
  document.getElementById('word-options').style.display     = isWords ? '' : 'none';
});

function updateEditedBadge(el) {
  const text = el.textContent;
  if (!text) return;
  let pool = 0;
  if (/[a-z]/.test(text)) pool += 26;
  if (/[A-Z]/.test(text)) pool += 26;
  if (/[0-9]/.test(text)) pool += 10;
  if (/[^a-zA-Z0-9]/.test(text)) pool += SYMBOLS.length;
  if (pool < 2) pool = 2;
  const bits = Math.round(text.length * Math.log2(pool));
  const badge = el.closest('.result-block').querySelector('.badge');
  if (!badge) return;
  const t = T[currentLang];
  const label = bits >= 80 ? t.strengthStrong : bits >= 60 ? t.strengthOk : bits >= 35 ? t.strengthMedium : t.strengthWeak;
  const cls   = bits >= 80 ? 'badge-strong'   : bits >= 60 ? 'badge-ok'     : bits >= 35 ? 'badge-medium'   : 'badge-weak';
  badge.className = `badge ${cls}`;
  badge.textContent = `${label} (~${bits} bit)`;
}

function renderPasswordResults(passwords, bits) {
  const t = T[currentLang];
  const box = document.getElementById('pw-results');
  box.innerHTML = passwords.map((pw, i) => `
    <div class="result-block">
      <div class="result-label">${t.pwPrefix} ${i + 1}</div>
      <div class="result-row">
        <span class="pw-editable" id="pw-val-${i}" contenteditable="plaintext-only" spellcheck="false">${escHtml(pw)}</span>
        <button class="copy-btn" onclick="copyText('pw-val-${i}', this)">${t.copy}</button>
      </div>
      ${strengthBadge(bits)}
    </div>
    ${i < passwords.length - 1 ? '<hr class="divider">' : ''}
  `).join('');
  box.querySelectorAll('.pw-editable').forEach(el => el.addEventListener('input', () => updateEditedBadge(el)));
  box.classList.add('show');
}

function generatePasswords() {
  const style     = document.getElementById('pw-style').value;
  const count     = Math.min(10, Math.max(1, parseInt(document.getElementById('pw-count').value) || 3));
  const addDigits = document.getElementById('pw-digits').checked;
  const addSymbol = document.getElementById('pw-symbol').checked;
  const wc  = parseInt(document.getElementById('pw-words').value);
  const sep = document.getElementById('pw-sep').value;
  const cap = document.getElementById('pw-cap').value;
  const len = Math.min(64, Math.max(8, parseInt(document.getElementById('pw-len').value) || 16));
  const pool = currentLang === 'pl' ? WORDS_PL : WORDS_EN;

  _lastBits = calcEntropy(style, wc, pool.length, addDigits, addSymbol, len);
  _lastPasswords = [];
  for (let i = 0; i < count; i++) {
    if (style === 'words') {
      _lastPasswords.push(makeWordPassword(wc, sep, cap, addDigits, addSymbol));
    } else {
      _lastPasswords.push(makeRandomPassword(len, addDigits, addSymbol));
    }
  }
  renderPasswordResults(_lastPasswords, _lastBits);
}

function base32Encode(bytes) {
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let out = '', bits = 0, val = 0;
  for (const byte of bytes) {
    val = (val << 8) | byte;
    bits += 8;
    while (bits >= 5) { out += alpha[(val >>> (bits - 5)) & 31]; bits -= 5; }
  }
  if (bits > 0) out += alpha[(val << (5 - bits)) & 31];
  return out;
}

function generateSecret() {
  const buf = new Uint8Array(20);
  crypto.getRandomValues(buf);
  return base32Encode(buf);
}

function base32Decode(input) {
  const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let bits = 0, val = 0;
  const out = [];
  for (const ch of input.toUpperCase().replace(/=+$/, '')) {
    const idx = alpha.indexOf(ch);
    if (idx === -1) continue;
    val = (val << 5) | idx;
    bits += 5;
    if (bits >= 8) { out.push((val >>> (bits - 8)) & 0xff); bits -= 8; }
  }
  return new Uint8Array(out);
}

async function computeTOTPCode(secret) {
  const PERIOD = 30;
  const step = Math.floor(Date.now() / 1000 / PERIOD);
  const msg = new ArrayBuffer(8);
  new DataView(msg).setUint32(4, step, false);
  const key = await crypto.subtle.importKey(
    'raw', base32Decode(secret),
    { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
  );
  const sig = new Uint8Array(await crypto.subtle.sign('HMAC', key, msg));
  const offset = sig[19] & 0xf;
  const code = (
    ((sig[offset]   & 0x7f) << 24) |
    ((sig[offset+1] & 0xff) << 16) |
    ((sig[offset+2] & 0xff) <<  8) |
     (sig[offset+3] & 0xff)
  ) % 1_000_000;
  return code.toString().padStart(6, '0');
}

let _totpInterval = null;

function stopTOTPTimer() {
  if (_totpInterval) { clearInterval(_totpInterval); _totpInterval = null; }
}

async function tickTOTP(secret) {
  const PERIOD = 30;
  const secsLeft = PERIOD - (Math.floor(Date.now() / 1000) % PERIOD);
  const pct = (secsLeft / PERIOD) * 100;

  const codeEl = document.getElementById('totp-live-code');
  const barEl  = document.getElementById('totp-bar');
  const secEl  = document.getElementById('totp-seconds');
  if (!codeEl) { stopTOTPTimer(); return; }

  // recompute code at each new period
  if (!codeEl.dataset.step || codeEl.dataset.step !== String(Math.floor(Date.now()/1000/PERIOD))) {
    const newStep = String(Math.floor(Date.now() / 1000 / PERIOD));
    codeEl.dataset.step = newStep;
    const code = await computeTOTPCode(secret);
    codeEl.textContent = code.slice(0,3) + ' ' + code.slice(3);
  }

  if (secEl) secEl.textContent = secsLeft;
  if (barEl) {
    barEl.style.width = pct + '%';
    barEl.style.background = secsLeft > 10 ? 'var(--accent2)' : secsLeft > 5 ? '#ffc107' : '#ff6b6b';
  }
}

async function renderTOTP(secret) {
  const t      = T[currentLang];
  const label  = document.getElementById('totp-label').value.trim()  || 'VPN User';
  const issuer = document.getElementById('totp-issuer').value.trim() || 'Cyfrowe VPN';
  const uri = `otpauth://totp/${encodeURIComponent(label)}?secret=${secret}&issuer=${encodeURIComponent(issuer)}&algorithm=SHA1&digits=6&period=30`;

  stopTOTPTimer();

  const box = document.getElementById('totp-results');
  box.innerHTML = `
    <div class="result-block">
      <div class="result-label">${t.liveCodeLabel}</div>
      <div class="totp-live">
        <div class="totp-code" id="totp-live-code" onclick="copyLiveCode(this)" title="${t.copy}">------</div>
        <div class="totp-bar-wrap"><div class="totp-bar" id="totp-bar" style="width:100%"></div></div>
        <div class="totp-countdown"><span id="totp-seconds">30</span>s</div>
      </div>
    </div>
    <hr class="divider">
    <div class="result-block">
      <div class="result-label">${t.secretLabel}</div>
      <div class="result-row">
        <span class="result-value" id="totp-secret">${secret}</span>
        <button class="copy-btn" onclick="copyText('totp-secret', this)">${t.copy}</button>
      </div>
    </div>
    <span id="totp-uri" style="display:none">${escHtml(uri)}</span>
    <hr class="divider">
    <div class="result-block">
      <div class="result-label">${t.qrLabel}</div>
      <div id="qr-container"></div>
    </div>
  `;
  box.classList.add('show');

  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  new QRCode(container, {
    text: uri, width: 200, height: 200,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  await tickTOTP(secret);
  _totpInterval = setInterval(() => tickTOTP(secret), 1000);
}

async function generateTOTP() {
  _lastTotpSecret = generateSecret();
  await renderTOTP(_lastTotpSecret);
}

function copyLiveCode(el) {
  const code = el.textContent.replace(/\s/g, '');
  navigator.clipboard.writeText(code).then(() => {
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 300);
  }).catch(() => {
    el.style.outline = '2px solid #ff6b6b';
    setTimeout(() => el.style.outline = '', 1500);
  });
}

function copyText(id, btn) {
  const el = document.getElementById(id);
  const text = el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const t = T[currentLang];
    btn.textContent = t.copied;
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = t.copy; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    // Fallback: select the text so user can copy manually
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    btn.textContent = '⚠';
    setTimeout(() => { btn.textContent = T[currentLang].copy; }, 2000);
  });
}
